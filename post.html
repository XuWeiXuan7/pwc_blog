<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情 - Xu Shuo Blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
</head>

<body>
  <!-- 粒子背景 -->
  <div id="particles-bg"></div>
  <div id="grid-bg"></div>

  <header class="header">
    <h1>Xu Shuo Blog</h1>
    <p class="subtitle">记录生活的点滴</p>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="publish.html">写文章</a>
    </nav>
  </header>

  <main class="container">
    <a href="index.html" class="back-btn">← 返回首页</a>
    <div id="post-detail" class="post-detail">
      <div class="empty-state">
        <h3>加载中...</h3>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 Xu Shuo Blog</p>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
  <script>
    // 粒子效果
    function initParticles () {
      const container = document.getElementById('particles-bg');
      if (!container) return;

      const particleCount = 60;
      const colors = ['#a78bfa', '#f472b6', '#34d399', '#fbbf24', '#60a5fa'];

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        const size = Math.random() * 4 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        particle.style.opacity = Math.random() * 0.5 + 0.3;
        container.appendChild(particle);
      }
    }

    // 加载文章
    async function loadPost () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        showError('缺少文章标识');
        return;
      }

      try {
        const post = await apiGetPost(id);
        if (!post) {
          showError('文章不存在');
          return;
        }

        document.title = post.title + ' - wxCode Blog';

        document.getElementById('post-detail').innerHTML = `
          <h1 class="title">${escapeHtml(post.title)}</h1>
          <div class="post-meta" style="margin-bottom:1.5rem;">
            <span>📅 ${post.date}</span>
            <span>👤 ${escapeHtml(post.author)}</span>
            ${post.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}
          </div>
          <div class="content">${parseMarkdown(post.content)}</div>
          <div style="margin-top:2rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.1);display:flex;gap:0.5rem;flex-wrap:wrap;">
            <a href="${getEditIssueUrl(id)}" target="_blank" class="btn btn-secondary">✏️ 去 Gitee 编辑/评论</a>
          </div>
        `;

        if (window.hljs) {
          document.querySelectorAll('.content pre code').forEach(block => {
            hljs.highlightElement(block);
          });
        }
      } catch (e) {
        showError('加载失败：' + e.message);
      }
    }

    function showError (msg) {
      document.getElementById('post-detail').innerHTML = `
        <div class="empty-state">
          <h3>出错了</h3>
          <p>${escapeHtml(msg)}</p>
          <p style="margin-top:1rem;"><a href="index.html">← 返回首页</a></p>
        </div>
      `;
    }

    initParticles();
    loadPost();
  </script>
</body>

</html>
